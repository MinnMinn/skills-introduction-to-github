version: "3.9"

services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass "${REDIS_PASSWORD:-changeme}"
    ports:
      - "6379:6379"
    networks:
      - app-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${DB_USER:-appuser}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-changeme}"
      POSTGRES_DB: "${DB_NAME:-appdb}"
    ports:
      - "5432:5432"
    networks:
      - app-net

  app:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
